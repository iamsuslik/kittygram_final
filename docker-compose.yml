version: '3.8'

services:
  db:
    image: postgres:13
    volumes:
      - pg_data:/var/lib/postgresql/data
    env_file:
      - .env

  backend:
    build: ./backend/
    env_file:
      - .env
    volumes:
      - static:/app/static/
      - media:/app/media/
    depends_on:
      - db

  frontend:
    build: ./frontend/
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static/

  gateway:
    build: ./nginx/
    container_name: gateway
    volumes:
      - static:/staticfiles/
      - media:/media/
    ports:
      - "8000:80"
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  static:
  media:
