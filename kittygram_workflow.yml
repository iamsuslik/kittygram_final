name: Kittygram Workflow

on:
  push:
    branches:
      - main

jobs:
  # 1. Тестирование проекта (бэкенд и фронтенд)
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install backend dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff
        pip install -r backend/requirements.txt

    - name: Linter check (ruff)
      run: ruff check backend/

    - name: Run backend tests
      run: |
        pytest

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install frontend dependencies
      run: |
        cd frontend/
        npm ci

    - name: Run frontend tests
      run: |
        cd frontend/
        npm test -- --watchAll=false

  # 2. Сборка и отправка образов на Docker Hub
  build_and_push:
    runs-on: ubuntu-latest
    needs: tests
    steps:
    - name: Check out the repo
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push backend to Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: ./backend/
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

    - name: Push frontend to Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: ./frontend/
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

    - name: Push gateway to Docker Hub
      uses: docker/build-push-action@v4
      with:
        context: ./nginx/
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  # 3. Отправка уведомления в Telegram
  send_message:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
    - name: Send telegram message
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          Проект: Kittygram
          Автор коммита: ${{ github.actor }}
          Сообщение коммита: ${{ github.event.commits[0].message }}
          Ссылка на коммит: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          
          Все тесты успешно пройдены! Образы kittygram_backend, kittygram_frontend и kittygram_gateway обновлены на Docker Hub. Сборка завершена успешно.
